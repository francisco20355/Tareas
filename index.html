<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexto 263 | Panel Central</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-800: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--slate-50); 
            margin: 0; 
            color: var(--slate-800);
            min-height: 100vh;
        }

        header {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--slate-100);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area h1 { margin: 0; font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .logo-area p { margin: 0; font-size: 0.8rem; color: #64748b; }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
        }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--slate-100);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        h2 { font-size: 1.2rem; margin-top: 0; border-bottom: 2px solid var(--slate-50); padding-bottom: 10px; }

        .item-list { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
        
        .item {
            padding: 1rem;
            border-radius: 12px;
            background: var(--slate-50);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .item:hover { border-color: var(--primary); background: white; }

        .badge {
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: inline-block;
        }

        .badge-task { background: #e0e7ff; color: var(--primary); }
        .badge-sos { background: #ffedd5; color: var(--warning); }

        .item-info h4 { margin: 0; font-size: 0.95rem; }
        .item-info p { margin: 3px 0; font-size: 0.85rem; color: #64748b; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; color: #475569; }
        
        input, textarea, select {
            width: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            font-size: 0.9rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .btn-done {
            background: white;
            border: 1px solid var(--slate-200);
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-done:hover { background: var(--success); color: white; border-color: var(--success); }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>Sexto 263 🎓</h1>
        <p>Escuela Solymar - Gestión Colaborativa</p>
    </div>
</header>

<div class="container">
    <main>
        <div class="card">
            <h2>📚 Tareas Pendientes</h2>
            <div id="lista-tareas" class="item-list">Cargando...</div>
        </div>

        <div class="card">
            <h2>🆘 Pedidos de Ayuda</h2>
            <div id="lista-ayudas" class="item-list">Cargando...</div>
        </div>
    </main>

    <aside>
        <div class="card">
            <h3>➕ Nueva Tarea</h3>
            <div class="form-group">
                <label>Materia</label>
                <input type="text" id="t-materia" placeholder="Ej: Matemática">
            </div>
            <div class="form-group">
                <label>¿Qué hay que hacer?</label>
                <textarea id="t-desc" rows="2" placeholder="Describe la tarea..."></textarea>
            </div>
            <div class="form-group">
                <label>Fecha de entrega</label>
                <input type="date" id="t-fecha">
            </div>
            <button class="btn" onclick="subirTarea()">Publicar Tarea</button>
        </div>

        <div class="card">
            <h3 style="color: var(--warning)">🤝 Pedir Ayuda</h3>
            <div class="form-group">
                <label>Tu duda</label>
                <input type="text" id="h-duda" placeholder="No entiendo tal cosa...">
            </div>
            <div class="form-group">
                <label>Materia</label>
                <select id="h-materia">
                    <option>Matemática</option>
                    <option>Lengua</option>
                    <option>Ciencias</option>
                    <option>Programación</option>
                    <option>Otro</option>
                </select>
            </div>
            <button class="btn" style="background: var(--warning)" onclick="subirAyuda()">Enviar SOS</button>
        </div>
    </aside>
</div>

<script>
    // Configuración de Supabase
    const SUPABASE_URL = 'https://rutohcsjlmfqgtflatrg.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1dG9oY3NqbG1mcWd0ZmxhdHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1OTU4MjcsImV4cCI6MjA5MTE3MTgyN30.Kg1pjBYMZiFpseplMVjfVtd4dT2JTdfkYJV_NtkW7mw';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- FUNCIONES DE TAREAS ---

    async function renderTareas() {
        const { data, error } = await supabaseClient
            .from('tareas')
            .select('*')
            .order('fecha_entrega', { ascending: true });

        // Obtener lo que YO ya marqué como listo en este dispositivo
        const misListos = JSON.parse(localStorage.getItem('tareasCompletadas')) || [];
        const div = document.getElementById('lista-tareas');

        if (data && data.length > 0) {
            let html = "";
            data.forEach(t => {
                // Solo mostrar si NO está en mi lista personal de listos
                if (!misListos.includes(t.id)) {
                    html += `
                        <div class="item">
                            <div class="item-info">
                                <span class="badge badge-task">${t.materia}</span>
                                <h4>${t.descripcion}</h4>
                                <p>📅 Entrega: ${t.fecha_entrega || 'Pendiente'}</p>
                            </div>
                            <button class="btn-done" onclick="marcarTareaComoLista('${t.id}')">Listo</button>
                        </div>
                    `;
                }
            });
            div.innerHTML = html || "<p style='font-size:0.8rem; color:#94a3b8'>¡Has terminado todas tus tareas! 🏆</p>";
        } else {
            div.innerHTML = "<p style='font-size:0.8rem; color:#94a3b8'>No hay tareas pendientes para nadie. 🎮</p>";
        }
    }

    async function subirTarea() {
        const materia = document.getElementById('t-materia').value;
        const descripcion = document.getElementById('t-desc').value;
        const fecha_entrega = document.getElementById('t-fecha').value;

        if (!materia || !descripcion) return alert("Completa los campos obligatorios");

        const { error } = await supabaseClient
            .from('tareas')
            .insert([{ materia, descripcion, fecha_entrega }]);

        if (error) {
            alert("Error al subir: " + error.message);
        } else {
            document.getElementById('t-materia').value = "";
            document.getElementById('t-desc').value = "";
            document.getElementById('t-fecha').value = "";
            renderTareas();
        }
    }

    function marcarTareaComoLista(id) {
        // Guardar localmente para que solo me desaparezca a MÍ
        let misListos = JSON.parse(localStorage.getItem('tareasCompletadas')) || [];
        if (!misListos.includes(id)) {
            misListos.push(id);
        }
        localStorage.setItem('tareasCompletadas', JSON.stringify(misListos));
        renderTareas();
    }

    // --- FUNCIONES DE AYUDA ---

    async function renderAyudas() {
        const { data, error } = await supabaseClient
            .from('ayudas')
            .select('*')
            .order('created_at', { ascending: false });

        const misAyudasResueltas = JSON.parse(localStorage.getItem('ayudasResueltas')) || [];
        const div = document.getElementById('lista-ayudas');
        
        if (data && data.length > 0) {
            let html = "";
            data.forEach(a => {
                if (!misAyudasResueltas.includes(a.id)) {
                    html += `
                        <div class="item">
                            <div class="item-info">
                                <span class="badge badge-sos">${a.materia}</span>
                                <h4>${a.duda}</h4>
                                <p>🙋‍♂️ Compañero esperando ayuda</p>
                            </div>
                            <button class="btn-done" onclick="marcarAyudaComoLista('${a.id}')">Entendido</button>
                        </div>
                    `;
                }
            });
            div.innerHTML = html || "<p style='font-size:0.8rem; color:#94a3b8'>Todo claro por aquí. 🤝</p>";
        } else {
            div.innerHTML = "<p style='font-size:0.8rem; color:#94a3b8'>Nadie necesita ayuda por ahora. ✨</p>";
        }
    }

    async function subirAyuda() {
        const duda = document.getElementById('h-duda').value;
        const materia = document.getElementById('h-materia').value;

        if (!duda) return alert("Escribe tu duda");

        const { error } = await supabaseClient
            .from('ayudas')
            .insert([{ duda, materia }]);

        if (error) {
            alert("Error al enviar SOS: " + error.message);
        } else {
            document.getElementById('h-duda').value = "";
            renderAyudas();
        }
    }

    function marcarAyudaComoLista(id) {
        let misAyudasResueltas = JSON.parse(localStorage.getItem('ayudasResueltas')) || [];
        if (!misAyudasResueltas.includes(id)) {
            misAyudasResueltas.push(id);
        }
        localStorage.setItem('ayudasResueltas', JSON.stringify(misAyudasResueltas));
        renderAyudas();
    }

    // --- INICIO ---
    function cargarTodo() {
        renderTareas();
        renderAyudas();
    }

    cargarTodo();
</script>

</body>
  </html>
